<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyuTok - Free Video App</title>
    <style>
        /* यहाँ डिज़ाइन है (CSS) */
        body { font-family: sans-serif; text-align: center; background-color: #121212; color: white; margin: 0; padding: 20px; }
        #player-container { margin-top: 20px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background-color: #ff4500; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; max-width: 400px; height: 500px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>AyuTok</h1>
    <p>बिना लॉगिन, सीधे वीडियो देखें!</p>

    <div id="player-container">
        <input type="text" id="videoLink" placeholder="यहाँ YouTube लिंक पेस्ट करें...">
        <button onclick="loadVideo()">चलाएं</button>
        <br>
        <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // यहाँ काम करने वाला कोड है (JavaScript)
        function loadVideo() {
            let link = document.getElementById("videoLink").value;
            // यह YouTube लिंक से ID निकालता है
            let videoId = "";
            if (link.includes("v=")) {
                videoId = link.split('v=')[1].substring(0, 11);
            } else if (link.includes("youtu.be/")) {
                videoId = link.split('youtu.be/')[1].substring(0, 11);
            }
            
            if (videoId) {
                document.getElementById("player").src = "https://www.youtube.com/embed/" + videoId;
            } else {
                alert("कृपया सही YouTube लिंक डालें!");
            }
        }
    </script>
</body>
</html>
